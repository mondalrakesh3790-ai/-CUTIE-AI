<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena · CUTIE AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1e1c1a;
            background: radial-gradient(circle at 10% 20%, #2e2b28 0%, #12100e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ece8e0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: rgba(18, 16, 14, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 36px 36px 30px 30px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(212, 175, 55, 0.1) inset;
            overflow: hidden;
        }

        .header {
            background: #0f1c27;
            background: linear-gradient(145deg, #102433 0%, #1a2c3d 100%);
            padding: 25px 20px 20px 20px;
            text-align: center;
            border-bottom: 2px solid #c5a028;
        }

        .header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 2.8rem;
            letter-spacing: 2px;
            color: #e5d9b5;
            text-shadow: 3px 3px 0 #0a141c, 6px 6px 0 rgba(170, 140, 60, 0.15);
            margin-bottom: 5px;
        }

        .gold-sep {
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9ae62, #ffe6a6, #c9ae62, transparent);
            width: 40%;
            margin: 8px auto;
            border-radius: 4px;
        }

        .status-bar {
            padding: 10px 15px;
            background: #1e241e;
            color: #d4c8a8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            border-bottom: 1px solid #404035;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-item i {
            color: #dbb957;
            font-size: 0.9rem;
        }

        .api-status {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
        }

        .connected {
            color: #4caf50;
        }
        
        .disconnected {
            color: #f44336;
        }

        .chat-messages {
            background: linear-gradient(165deg, #191e22 0%, #23282e 100%);
            padding: 20px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #2b2f33;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #746b4e;
            border-radius: 20px;
        }

        .message {
            display: flex;
            width: 100%;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            border-radius: 25px;
            box-shadow: 0 4px 10px -5px rgba(0,0,0,0.5);
            position: relative;
            word-break: break-word;
        }

        .user .bubble {
            background: linear-gradient(135deg, #2b4f3a, #1e3f2d);
            color: #f2ecd9;
            border-bottom-right-radius: 5px;
            border: 1px solid #6f8f72;
        }

        .bot .bubble {
            background: linear-gradient(135deg, #2e3840, #1f282f);
            color: #ece3cf;
            border-bottom-left-radius: 5px;
            border: 1px solid #6a6f5a;
        }

        .input-area {
            display: flex;
            padding: 15px 20px;
            background: linear-gradient(145deg, #1b2125, #13181b);
            border-top: 1px solid #544f3e;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            min-width: 200px;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: #baa25d;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        #input {
            width: 100%;
            background: #0a0d0f;
            border: 2px solid #3c3f3a;
            border-radius: 40px;
            padding: 12px 20px 12px 45px;
            font-size: 0.95rem;
            color: #ede7d7;
            outline: none;
        }

        #input:focus {
            border-color: #b69e54;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        button {
            background: linear-gradient(145deg, #3c4a54, #1d2b33);
            border: 1.5px solid #ad8f4c;
            color: #f0e8d2;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        button i {
            color: #e5c87b;
        }

        button:hover {
            background: #2f424f;
            border-color: #cfb26b;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(2px);
        }

        .mic-btn {
            background: linear-gradient(145deg, #4a3c2d, #2b221a);
        }

        @media (max-width: 600px) {
            .header h2 { font-size: 2.2rem; }
            .status-bar { flex-direction: column; align-items: flex-start; }
            .action-buttons { width: 100%; }
            button { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Athena</h2>
        <div class="gold-sep"></div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-item">
                <i class="fas fa-language"></i>
                <span>Bangla Accent</span>
            </div>
            <div class="status-item">
                <i class="fas fa-database"></i>
                <span>Groq AI</span>
            </div>
        </div>
        <div class="api-status" id="apiStatus">
            <i class="fas fa-circle" id="statusIcon"></i>
            <span id="statusText">Checking API...</span>
        </div>
    </div>

    <div class="chat-messages" id="chat">
        <div class="message bot">
            <div class="bubble">নমস্কার! আমি Athena। বলো কি খবর? 🎤</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <i class="fas fa-pen-nib"></i>
            <input type="text" id="input" placeholder="লিখুন... (type here)">
        </div>
        <div class="action-buttons">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> পাঠান</button>
            <button class="mic-btn" onclick="startVoice()" id="micBtn">
                <i class="fas fa-microphone"></i> বলুন
            </button>
        </div>
    </div>
</div>

<script>
    // ================= CONFIGURATION =================
    const RENDER_API_URL = "https://cutie-ai-1-j4p4.onrender.com";
    
    // ================= DOM ELEMENTS =================
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const apiStatus = document.getElementById("apiStatus");
    const statusIcon = document.getElementById("statusIcon");
    const statusText = document.getElementById("statusText");
    const micBtn = document.getElementById("micBtn");

    // ================= API STATUS CHECK =================
    async function checkApiStatus() {
        try {
            const response = await fetch(`${RENDER_API_URL}/status`);
            if (response.ok) {
                const data = await response.json();
                statusIcon.className = "fas fa-circle connected";
                statusText.innerHTML = "Connected to AI";
                statusText.style.color = "#4caf50";
                return true;
            } else {
                throw new Error("API error");
            }
        } catch (e) {
            statusIcon.className = "fas fa-circle disconnected";
            statusText.innerHTML = "API Offline";
            statusText.style.color = "#f44336";
            return false;
        }
    }

    // ================= ADD MESSAGE TO CHAT =================
    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = `<div class="bubble">${text}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // ================= SEND MESSAGE TO RENDER API =================
    async function sendMessage(msg = null) {
        const message = msg || input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        try {
            const res = await fetch(`${RENDER_API_URL}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            
            const data = await res.json();
            addMessage(data.response, "bot");
            speakText(data.response);
        } catch (e) {
            console.error("Error:", e);
            addMessage("⚠️ সার্ভার এ সমস্যা। আবার চেষ্টা করুন।", "bot");
            checkApiStatus();
        }
    }

    // ================= VOICE RECOGNITION (Bangla/English) =================
    let recognition = null;
    let isListening = false;

    function startVoice() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("আপনার ব্রাউজার voice recognition support করে না।");
            return;
        }

        if (isListening) {
            recognition.stop();
            return;
        }

        try {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'bn-BD'; // Bangla first
            
            recognition.onstart = () => {
                isListening = true;
                micBtn.innerHTML = '<i class="fas fa-stop"></i> থামুন';
                micBtn.style.background = "linear-gradient(145deg, #4a3c2d, #3a2c1d)";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                console.log("Voice heard:", transcript);
                
                // Check for wake words
                const lower = transcript.toLowerCase();
                if (lower.includes("কিউটি") || lower.includes("আথেনা") || lower.includes("cutie")) {
                    let command = transcript.replace(/কিউটি|আথেনা|cutie/gi, "").trim();
                    if (command) {
                        sendMessage(command);
                    } else {
                        sendMessage("হ্যালো");
                    }
                } else {
                    // Direct command without wake word
                    sendMessage(transcript);
                }
            };

            recognition.onerror = (event) => {
                console.log("Voice error:", event.error);
                resetMicButton();
            };

            recognition.onend = () => {
                resetMicButton();
            };

            recognition.start();
        } catch (e) {
            console.error("Voice init error:", e);
            resetMicButton();
        }
    }

    function resetMicButton() {
        isListening = false;
        micBtn.innerHTML = '<i class="fas fa-microphone"></i> বলুন';
        micBtn.style.background = "linear-gradient(145deg, #4a3c2d, #2b221a)";
    }

    // ================= TEXT TO SPEECH (Bangla accent) =================
    function speakText(text) {
        if (!window.speechSynthesis) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        
        // Try to get Bangla voice
        const voices = window.speechSynthesis.getVoices();
        const banglaVoice = voices.find(v => v.lang.includes('bn') || v.lang.includes('ben'));
        const indianVoice = voices.find(v => v.lang === 'en-IN');
        
        if (banglaVoice) {
            utterance.voice = banglaVoice;
            utterance.lang = 'bn-BD';
        } else if (indianVoice) {
            utterance.voice = indianVoice;
            utterance.lang = 'en-IN';
        }
        
        window.speechSynthesis.speak(utterance);
    }

    // ================= EVENT LISTENERS =================
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    // ================= INITIALIZATION =================
    window.onload = () => {
        checkApiStatus();
        setInterval(checkApiStatus, 30000); // Check every 30 seconds
        
        // Preload voices
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
    };
</script>
</body>
</html>
