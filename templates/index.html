<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena · CUTIE AI Assistant</title>
    <!-- classic & premium fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* (apnar existing CSS style gulo same thakbe) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1e1c1a;
            background: radial-gradient(circle at 10% 20%, #2e2b28 0%, #12100e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #ece8e0;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: rgba(18, 16, 14, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 36px 36px 30px 30px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(212, 175, 55, 0.1) inset;
            overflow: hidden;
        }

        .header {
            background: #0f1c27;
            background: linear-gradient(145deg, #102433 0%, #1a2c3d 100%);
            padding: 30px 20px 22px 20px;
            text-align: center;
            border-bottom: 2px solid #c5a028;
        }

        .header h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 3.2rem;
            letter-spacing: 2px;
            color: #e5d9b5;
            text-shadow: 3px 3px 0 #0a141c, 6px 6px 0 rgba(170, 140, 60, 0.15);
            margin-bottom: 0;
        }

        .gold-sep {
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9ae62, #ffe6a6, #c9ae62, transparent);
            width: 40%;
            margin: 12px auto 6px auto;
            border-radius: 4px;
        }

        .status {
            padding: 12px 10px;
            background: #1e241e;
            color: #d4c8a8;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            border-bottom: 1px solid #404035;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status i {
            color: #dbb957;
            font-size: 1.1rem;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); text-shadow: 0 0 5px gold; }
            100% { opacity: 0.7; transform: scale(1); }
        }

        .chat-messages {
            background: linear-gradient(165deg, #191e22 0%, #23282e 100%);
            padding: 25px 25px 15px 25px;
            min-height: 380px;
            max-height: 480px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #2b2f33;
            border-radius: 20px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #746b4e;
            border-radius: 20px;
            border: 1px solid #a58f5a;
        }

        .message {
            display: flex;
            width: 100%;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 14px 22px;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 30px;
            font-weight: 400;
            box-shadow: 0 8px 18px -8px rgba(0,0,0,0.5);
            position: relative;
            font-family: 'Inter', sans-serif;
            word-break: break-word;
        }

        .user .bubble {
            background: linear-gradient(135deg, #2b4f3a, #1e3f2d);
            color: #f2ecd9;
            border-bottom-right-radius: 8px;
            border: 1px solid #6f8f72;
            box-shadow: -4px 4px 0 #0f2b1c;
        }

        .bot .bubble {
            background: linear-gradient(135deg, #2e3840, #1f282f);
            color: #ece3cf;
            border-bottom-left-radius: 8px;
            border: 1px solid #6a6f5a;
            box-shadow: 4px 4px 0 #0f1419;
        }

        .bot .bubble::before {
            font-family: "Font Awesome 6 Free";
            content: "\f0a5";
            font-weight: 900;
            position: absolute;
            left: -18px;
            bottom: 6px;
            font-size: 1rem;
            color: #cbb26a;
            opacity: 0.6;
            background: #1a1f24;
            border-radius: 50%;
            padding: 3px;
            border: 1px solid #7b6d46;
        }

        .user .bubble::after {
            font-family: "Font Awesome 6 Free";
            content: "\f007";
            font-weight: 900;
            position: absolute;
            right: -18px;
            bottom: 6px;
            font-size: 1rem;
            color: #cdb46e;
            opacity: 0.6;
            background: #1d3527;
            border-radius: 50%;
            padding: 3px 4px;
            border: 1px solid #6f8f72;
        }

        .input-area {
            display: flex;
            padding: 20px 25px 25px 25px;
            background: linear-gradient(145deg, #1b2125, #13181b);
            border-top: 1px solid #544f3e;
            gap: 14px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            color: #baa25d;
            font-size: 1rem;
            opacity: 0.9;
            pointer-events: none;
        }

        #input {
            width: 100%;
            background: #0a0d0f;
            border: 2px solid #3c3f3a;
            border-radius: 50px;
            padding: 15px 25px 15px 52px;
            font-size: 1rem;
            color: #ede7d7;
            outline: none;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
        }

        #input:focus {
            border-color: #b69e54;
            background: #111618;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25), inset 0 2px 6px #000;
        }

        button {
            background: linear-gradient(145deg, #3c4a54, #1d2b33);
            border: 1.5px solid #ad8f4c;
            color: #f0e8d2;
            border-radius: 60px;
            padding: 15px 34px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 0 #0a1217, 0 6px 12px black;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.6px;
        }

        button i {
            color: #e5c87b;
            font-size: 1.2rem;
        }

        button:hover {
            background: #2f424f;
            border-color: #cfb26b;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #0a1217, 0 8px 16px black;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0a1217;
        }

        .connection-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
            margin-left: 10px;
        }
        
        .connected {
            color: #4caf50;
        }
        
        .disconnected {
            color: #f44336;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>Athena</h2>
        <div class="gold-sep"></div>
    </div>

    <div class="status">
        <i class="fas fa-circle"></i> 
        <span>Bangla Voice Assistant</span>
        <span id="apiStatus" class="connection-status disconnected">● Connecting...</span>
    </div>

    <div class="chat-messages" id="chat">
        <div class="message bot">
            <div class="bubble">নমস্কার! আমি Athena, আপনার ব্যক্তিগত সহায়ক। কিভাবে সাহায্য করতে পারি?</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <i class="fas fa-pen-nib"></i>
            <input type="text" id="input" placeholder="এখানে লিখুন...">
        </div>
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> পাঠান</button>
    </div>
</div>

<script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const apiStatus = document.getElementById("apiStatus");
    
    // ========== Render API URL - এখানে আপনার Render URL দিন ==========
    const RENDER_API_URL = "https://cutie-ai.onrender.com"; // আপনার Render URL দিন
    // =================================================================

    function updateApiStatus(connected, message) {
        if (connected) {
            apiStatus.innerHTML = '● Connected';
            apiStatus.className = 'connection-status connected';
        } else {
            apiStatus.innerHTML = `● ${message || 'Disconnected'}`;
            apiStatus.className = 'connection-status disconnected';
        }
    }

    // Check API connection on load
    async function checkApiConnection() {
        try {
            const response = await fetch(`${RENDER_API_URL}/status`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });
            if (response.ok) {
                const data = await response.json();
                updateApiStatus(true, 'Connected');
                console.log('API connected:', data);
            } else {
                updateApiStatus(false, 'API Error');
            }
        } catch (e) {
            console.error('API connection failed:', e);
            updateApiStatus(false, 'Offline');
        }
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "message " + type;
        div.innerHTML = `<div class="bubble">${text}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage(msg = null) {
        const message = msg || input.value.trim();
        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        try {
            // Render API তে request পাঠানো
            const res = await fetch(`${RENDER_API_URL}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            
            const data = await res.json();
            addMessage(data.response, "bot");
            speak(data.response);
        } catch (e) {
            console.warn("Server not reachable:", e);
            const fallback = "সার্ভার এ সমস্যা। দয়া করে আবার চেষ্টা করুন।";
            addMessage(fallback, "bot");
            updateApiStatus(false, 'Offline');
        }
    }

    input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") sendMessage();
    });

    // ================= VOICE SYSTEM =================
    let recognition;
    let listening = false;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'bn-BD';  // Bangla language
        recognition.interimResults = false;

        recognition.onresult = function (event) {
            const transcript = event.results[event.results.length - 1][0].transcript.trim();
            console.log("Heard:", transcript);

            // Wake word check - both English and Bangla
            if (transcript.toLowerCase().includes("hey cutie") || 
                transcript.toLowerCase().includes("কিউটি") ||
                transcript.toLowerCase().includes("আথেনা")) {
                
                let command = transcript.toLowerCase()
                    .replace("hey cutie", "")
                    .replace("কিউটি", "")
                    .replace("আথেনা", "")
                    .trim();
                
                command = command.replace(/^[.,!?;:]+/, '').trim();
                
                if (command.length > 0) {
                    sendMessage(command);
                } else {
                    sendMessage("হ্যালো");   // polite nudge
                }
            }
        };

        recognition.onerror = function (event) {
            console.log("Voice error:", event.error);
        };

        recognition.start();
        listening = true;
    } else {
        const statusDiv = document.querySelector('.status');
        if (statusDiv) {
            statusDiv.innerHTML = `<i class="fas fa-microphone-slash" style="color:#b48b5a;"></i> Voice not supported`;
        }
    }

    // Text-to-Speech with Bangla support
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(text);
        
        // Try Bangla voice first
        const voices = window.speechSynthesis.getVoices();
        const banglaVoice = voices.find(v => v.lang.includes('bn') || v.lang.includes('ben'));
        const indianVoice = voices.find(v => v.lang === 'en-IN');
        
        if (banglaVoice) {
            speech.voice = banglaVoice;
            speech.lang = 'bn-BD';
        } else if (indianVoice) {
            speech.voice = indianVoice;
            speech.lang = 'en-IN';
        }
        
        speech.rate = 0.9;
        speech.pitch = 1.2;
        window.speechSynthesis.speak(speech);
    }

    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
    }

    // Check API connection on load
    checkApiConnection();
    // Check every 30 seconds
    setInterval(checkApiConnection, 30000);
</script>
<!-- small classic signature -->
<div style="position: fixed; bottom: 6px; right: 20px; opacity:0.3; font-size: 12px; color: #bba十五;">Athena · CUTIE AI</div>
</body>
</html>
